version: '3.8'

services:
  elt-postgres:
    image: postgres:16
    container_name: elt-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: alivhits2/hg-elt-assignment:latest
    container_name: airflow-init
    depends_on:
      elt-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:password@elt-postgres/warehouse
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    command:
      - bash
      - -c
      - >-
        airflow db init &&
        airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com
    volumes:
      - ./data:/opt/airflow/data

  airflow-webserver:
    image: alivhits2/hg-elt-assignment:latest
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:password@elt-postgres/warehouse
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "hgi_elt_secret_key"
    command: airflow webserver
    volumes:
      - ./data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs

  airflow-scheduler:
    image: alivhits2/hg-elt-assignment:latest
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:password@elt-postgres/warehouse
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: "hgi_elt_secret_key"
    command: airflow scheduler
    volumes:
      - ./data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs

volumes:
  postgres_data:
  airflow_logs:
